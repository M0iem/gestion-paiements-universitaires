<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Suivi Paiements - Meriem Yafir</title>

</head>

<body>
<div class="container">

<div class="header">
    <div class="badge">1ère année Master</div>
    <h1>Meriem Yafir</h1>
    <div class="subtitle">Gestion des Paiements Universitaires</div>
</div>

<div class="cards">
    <div class="card">
        <h3>TOTAL À PAYER</h3>
        <div class="amount blue" id="total">25,000 DH</div>
    </div>

    <div class="card">
        <h3>TOTAL PAYÉ</h3>
        <div class="amount green" id="paid"></div>
        <div id="percent" style="color:#16a34a;font-size:13px;"></div>
    </div>

    <div class="card">
        <h3>RESTE À PAYER</h3>
        <div class="amount red" id="remaining"></div>
    </div>
</div>

<div class="table">
    <svg class="w-6 h-6 mr-2 text-blue-600 dark:text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
    <h3>Historique des Paiements</h3>
    <table>
        <tr>
            <th>Référence</th>
            <th>Montant</th>
            <th>Date</th>
            <th>Statut</th>
            <th>Reçu</th>
        </tr>
        <tr>
            <td>#1</td>
            <td>8,500 DH</td>
            <td>02/11/2025</td>
            <td><span class="status">Payé</span></td>
             <td>
              <button  onclick="telecharger('Recu 1.jpeg')">
                <i class="fa-solid fa-download"></i>Télécharger
              </button>
            </td>
        </tr>
        <tr>
            <td>#2</td>
            <td>8,500 DH</td>
            <td>02/03/2026</td>
            <td><span class="status">Payé</span></td>
             <td>
               <button  onclick="telecharger('Recu 2.jpeg')">
                <i class="fa-solid fa-download"></i>Télécharger
               </button>
            </td>
        </tr>
        <tr>
            <td>#3</td>
            <td>8,000 DH</td>
            <td>—</td>
            <td style="color:#dc2626;">En attente</td>
        </tr>
    
    </table>
</div>

<br>

<div class="card">
    <h3>Progression Globale</h3>
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
</div>

</div>


<script src="script.js"></script>
</body>
</html>
